name: Build JumboLang Core

on: [push]

jobs:
  compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install NASM
        run: sudo apt-get update && sudo apt-get install -y nasm
      - name: Build Engine
        run: make build
      - name: Upload jumbol executable
        uses: actions/upload-artifact@v3
        with:
          name: jumbol-linux
          path: jumbol
