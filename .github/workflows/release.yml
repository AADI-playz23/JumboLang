name: JumboLang V1 Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build JumboLang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential
          g++ src/*.cpp src/features/*.cpp -o jumbol -Iinclude -O3

      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-gcc

      - name: Build JumboLang (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          g++ src/*.cpp src/features/*.cpp -o jumbol.exe -Iinclude -O3 -lws2_32

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            jumbol
            jumbol.exe

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            jumbol
            jumbol.exe
          name: JumboLang V1-Prototype-Cross
          body: |
            🐘 JumboLang V1 Prototype is officially Cross-Platform!
            - Fixed: GitHub Actions v3 Deprecation.
            - Optimized: O(1) Interpreter Loop.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
