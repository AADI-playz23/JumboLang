name: JumboLang V1 Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Upgraded

      - name: Build JumboLang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          g++ src/*.cpp src/features/*.cpp -o jumbol -Iinclude -O3

      - name: Build JumboLang (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          g++ src/*.cpp src/features/*.cpp -o jumbol.exe -Iinclude -O3 -lws2_32

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4 # Upgraded to v4 to fix the error
        with:
          name: binary-${{ matrix.os }}
          path: |
            jumbol
            jumbol.exe

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2 # Upgraded to v2
        with:
          files: |
            jumbol
            jumbol.exe
          name: JumboLang V1-Prototype-Cross
          body: |
            🐘 JumboLang V1 Prototype is officially Cross-Platform!
            - Fixed: GitHub Actions v3 Deprecation Error.
            - Added: Windows (.exe) and Linux binary support.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
