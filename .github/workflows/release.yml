name: JumboLang V1 Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    # --- FIX 1: Explicitly grant Write permission for Releases ---
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- LINUX BUILD ---
      - name: Build JumboLang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y build-essential
          g++ src/*.cpp src/features/*.cpp -o jumbol -Iinclude -O3

      # --- WINDOWS BUILD (Static Linking Fix for DLL errors) ---
      - name: Set up MSYS2 (Windows)
        if: matrix.os == 'windows-latest'
        uses: msys2/setup-msys2@v2
        with:
          install: mingw-w64-x86_64-gcc

      - name: Build JumboLang (Windows)
        if: matrix.os == 'windows-latest'
        shell: msys2 {0}
        run: |
          g++ src/*.cpp src/features/*.cpp -o jumbol.exe -Iinclude -O3 \
              -static -static-libgcc -static-libstdc++ -lws2_32

      # --- FIX 2: UPGRADE TO V4 ARTIFACTS (Fixes your current error) ---
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            jumbol
            jumbol.exe

      # --- RELEASE STEP ---
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            jumbol
            jumbol.exe
          fail_on_unmatched_files: false
          name: JumboLang V1.0.7 Portable Release
          body: |
            🐘 JumboLang V1.0.7 is officially Portable!
            - Fixed: Deprecated Artifact Actions v3 error.
            - Fixed: GitHub 403 Permission error.
            - Fixed: Missing DLL errors on Windows via static linking.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
