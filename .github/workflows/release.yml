name: JumboLang V1 Cross-Platform Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # FIX: Upgraded to v4

      - name: Build JumboLang (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          g++ src/*.cpp src/features/*.cpp -o jumbol -Iinclude -O3

      - name: Build JumboLang (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          g++ src/*.cpp src/features/*.cpp -o jumbol.exe -Iinclude -O3 -lws2_32

      - name: Create Release
        uses: softprops/action-gh-release@v2 # FIX: Upgraded to v2
        with:
          files: |
            jumbol
            jumbol.exe
          name: JumboLang V1-Prototype-Cross
          body: |
            🐘 JumboLang V1 is now Cross-Platform!
            - Linux Binary: `jumbol`
            - Windows Executable: `jumbol.exe`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
